id: add_custom
description: |
  Minimal non-SK elementwise add operator template. Emits a clean __global__
  __vector__ kernel that can be fed straight into adapt-sk-from-global to
  derive the SK adaptation. Use this as the canonical "clean input" demo for
  the 5-skill closure loop.

  Placeholder syntax: string.Template style ($id, $dtype, $ctype). Curly
  braces in kernel code therefore do not need to be escaped.
parameters:
  - name: dtype
    kind: choice
    default: float16
    allowed: [float16, float32, int32]
files:
  - path: csrc/$id.asc
    template: |
      #include "kernel_operator.h"

      class KernelAdd {
      public:
          __aicore__ inline void Init(GM_ADDR x, GM_ADDR y, GM_ADDR z, uint32_t totalLength) {
              xGm = x;
              yGm = y;
              zGm = z;
              length = totalLength;
          }
          __aicore__ inline void Process() {
              // dtype = $dtype (ctype = $ctype)
              // Real implementation iterates tiles and performs elementwise add.
          }
      private:
          GM_ADDR xGm;
          GM_ADDR yGm;
          GM_ADDR zGm;
          uint32_t length = 0;
      };

      extern "C" __global__ __vector__ void $id(GM_ADDR x, GM_ADDR y, GM_ADDR z, uint32_t totalLength)
      {
          KernelAdd op;
          op.Init(x, y, z, totalLength);
          op.Process();
      }
  - path: README.md
    template: |
      # $id

      Non-SK elementwise add operator (dtype=$dtype). Generated by
      sk-operator-codegen's `generate-from-template` command.

      Next step:

      ```
      python3 <skills_root>/sk-operator-codegen/scripts/operator_codegen.py \
          adapt-sk-from-global <asset_dir> --output-dir <out_dir>
      ```
